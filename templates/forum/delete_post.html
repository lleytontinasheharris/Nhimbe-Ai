{% extends 'base.html' %}

{% block title %}Delete Post{% endblock %}

{% block content %}
<section class="page-section">
    <div class="forum-container forum-container--narrow">

        <div class="form-card form-card--danger">
            <h1>Delete Post</h1>
            <p>Are you sure you want to delete <strong>"{{ post.title }}"</strong>? This cannot be undone.</p>

            <form method="POST">
                {% csrf_token %}
                <div class="delete-actions">
                    <button type="submit" class="btn btn-danger">Yes, Delete</button>
                    <a href="{% url 'forum:post_detail' slug=post.slug %}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>

    </div>
</section>
{% endblock %}
